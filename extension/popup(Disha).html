<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Meeting Settings</title>
    <link rel="stylesheet" href="popup(Disha).css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">👻</div>
            <h1>Ghost Meeting</h1>
        </header>

        <main>
            <div class="form-group">
                <label for="userName">Your Name</label>
                <input type="text" id="userName" placeholder="e.g., John Doe" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="triggerKeywords">Trigger Keywords (comma-separated)</label>
                <textarea id="triggerKeywords" placeholder="e.g., urgent, review, action item"></textarea>
            </div>

            <div class="actions">
                <button id="toggleGhosting" class="btn primary">Start Ghosting</button>
            </div>
        </main>

        <footer>
            <div class="status">
                <span class="indicator offline" id="statusIndicator"></span>
                <span id="statusText">Ready to start</span>
            </div>
        </footer>
    </div>
    <script src="popup(Disha).js"></script>
</body>
</html>
